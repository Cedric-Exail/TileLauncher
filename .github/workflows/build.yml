name: Build TileLauncher C++ — Windows 11 x64

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Recherche MSVC via vswhere ─────────────────────────────────────
      - name: Find MSVC
        shell: pwsh
        run: |
          $vswhere = "C:/Program Files (x86)/Microsoft Visual Studio/Installer/vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath 2>$null
          $vcvars = "$vsPath/VC/Auxiliary/Build/vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            Write-Error "vcvars64.bat introuvable dans $vsPath"; exit 1
          }
          echo "VCVARS=$vcvars" >> $env:GITHUB_ENV
          Write-Host "VCVARS=$vcvars"

      # ── Qt6 MSVC pre-compile via aqt ──────────────────────────────────
      - name: Install Qt6 (aqt)
        shell: pwsh
        run: |
          pip install aqtinstall --quiet
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 `
            --outputdir C:/Qt `
            --archives qtbase
          $qt6cfg = "C:/Qt/6.8.3/msvc2022_64/lib/cmake/Qt6/Qt6Config.cmake"
          if (Test-Path $qt6cfg) { Write-Host "Qt6Config.cmake OK" }
          else { Write-Error "Qt6Config.cmake introuvable"; exit 1 }
          echo "QT_DIR=C:/Qt/6.8.3/msvc2022_64" >> $env:GITHUB_ENV

      # ── Configure CMake ────────────────────────────────────────────────
      - name: Configure CMake (MSVC)
        shell: cmd
        run: |
          call "%VCVARS%"
          cmake -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_PREFIX_PATH="%QT_DIR%"
          if errorlevel 1 (
            type build\CMakeFiles\CMakeError.log 2>nul
            exit /b 1
          )

      # ── Compilation ────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          call "%VCVARS%"
          cmake --build build --config Release --parallel
          if errorlevel 1 exit /b 1


      # ── Vérification ──────────────────────────────────────────────────
      - name: Verify build
        shell: pwsh
        run: |
          # Chercher l exe dans tout le dossier build
          Write-Host "=== Contenu de build/ ==="
          Get-ChildItem "build" -Recurse -Include "*.exe","*.dll" |
            Select-Object FullName, @{N="Mo";E={[math]::Round($_.Length/1MB,2)}}

          $exe = Get-ChildItem "build" -Recurse -Filter "TileLauncher.exe" |
            Select-Object -First 1
          if (-not $exe) { Write-Error "Exe introuvable"; exit 1 }

          $mb = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "FOUND: $($exe.FullName) ($mb Mo)"
          echo "EXE_FULL=$($exe.FullName)" >> $env:GITHUB_ENV

      # ── Copie tiles.ini ───────────────────────────────────────────────
      - name: Copy config
        shell: pwsh
        run: Copy-Item "tiles.ini" "build\tiles.ini" -Force

      # ── Packaging ZIP ─────────────────────────────────────────────────
      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          # Copier exe + DLL Qt deployees par windeployqt (POST_BUILD)
          $exeDir = Split-Path $env:EXE_FULL
          Get-ChildItem $exeDir -Include "*.exe","*.dll" -Recurse |
            Copy-Item -Destination "deploy/" -Force
          foreach ($plug in @("platforms","styles","imageformats")) {
            $src = Join-Path $exeDir $plug
            if (Test-Path $src) { Copy-Item $src "deploy/" -Recurse -Force }
          }
          Copy-Item "tiles.ini" "deploy/tiles.ini" -Force

          Compress-Archive -Path "deploy\*" `
            -DestinationPath "TileLauncher_Cpp_Win11_x64.zip" -Force

          $exeMB = [math]::Round((Get-Item "deploy\TileLauncher.exe").Length / 1MB, 2)
          $zipMB = [math]::Round((Get-Item "TileLauncher_Cpp_Win11_x64.zip").Length / 1MB, 1)
          Write-Host "exe standalone: $exeMB Mo  zip: $zipMB Mo"
          echo "EXE_MB=$exeMB" >> $env:GITHUB_ENV
          echo "ZIP_MB=$zipMB" >> $env:GITHUB_ENV

      # ── Upload artifact ───────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: TileLauncher_Cpp_Win11_x64
          path: TileLauncher_Cpp_Win11_x64.zip
          retention-days: 30

      # ── Résumé ────────────────────────────────────────────────────────
      - name: Build summary
        shell: pwsh
        run: |
          echo "## Build C++ OK" >> $env:GITHUB_STEP_SUMMARY
          echo "| Fichier | Taille |" >> $env:GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| TileLauncher.exe | $env:EXE_MB Mo |" >> $env:GITHUB_STEP_SUMMARY
          echo "| TileLauncher_Cpp_Win11_x64.zip | $env:ZIP_MB Mo |" >> $env:GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════
  test:
    needs: build
    runs-on: windows-2025-vs2026

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: TileLauncher_Cpp_Win11_x64
          path: test_dir

      - name: Extract ZIP
        shell: pwsh
        run: |
          Expand-Archive -Path "test_dir\TileLauncher_Cpp_Win11_x64.zip" `
            -DestinationPath "test_dir" -Force
          dir test_dir\

      - name: "TEST 1 : Existence et taille"
        shell: pwsh
        run: |
          $exe = Get-ChildItem "test_dir" -Filter "TileLauncher.exe" -Recurse |
            Select-Object -First 1
          if (-not $exe) { Write-Error "FAIL - exe introuvable"; exit 1 }
          $mb = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "PASS - $($exe.FullName) ($mb Mo)"
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: "TEST 2 : tiles.ini present"
        shell: pwsh
        run: |
          $ini = Get-ChildItem "test_dir" -Filter "tiles.ini" -Recurse |
            Select-Object -First 1
          if (-not $ini) { Write-Error "FAIL - tiles.ini introuvable"; exit 1 }
          Write-Host "PASS - $($ini.FullName)"

      - name: "TEST 3 : Ecriture helper EnumWindows"
        shell: pwsh
        run: |
          $line1 = 'using System; using System.Runtime.InteropServices; using System.Text;'
          $line2 = 'public class Win32Helper {'
          $line3 = '  public delegate bool EnumWndProc(IntPtr h, IntPtr l);'
          $line4 = '  [DllImport("user32.dll")] public static extern bool EnumWindows(EnumWndProc c, IntPtr l);'
          $line5 = '  [DllImport("user32.dll")] public static extern uint GetWindowThreadProcessId(IntPtr h, out uint p);'
          $line6 = '  [DllImport("user32.dll")] public static extern int GetWindowTextLength(IntPtr h);'
          $line7 = '  public static bool HasWindowForPid(int pid) {'
          $line8 = '    bool f=false;'
          $line9 = '    EnumWindows((h,l)=>{ uint p; GetWindowThreadProcessId(h,out p);'
          $lineA = '      if((int)p==pid && GetWindowTextLength(h)>0){f=true;return false;} return true;},IntPtr.Zero);'
          $lineB = '    return f;}}'
          Set-Content -Path "win32helper.cs" -Value @($line1,$line2,$line3,$line4,$line5,$line6,$line7,$line8,$line9,$lineA,$lineB) -Encoding UTF8
          Write-Host "win32helper.cs ecrit"

      - name: "TEST 3b : Compilation helper"
        shell: pwsh
        run: |
          $csc = Join-Path $env:WINDIR "Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          & $csc /target:library /out:win32helper.dll win32helper.cs 2>&1
          if (-not (Test-Path "win32helper.dll")) {
            Write-Error "FAIL - compilation helper"; exit 1
          }
          Write-Host "win32helper.dll OK"

      - name: "TEST 4 : Demarrage + Temps de lancement"
        shell: pwsh
        run: |
          Add-Type -Path "win32helper.dll"
          $exePath = $env:EXE_PATH
          $workDir = Split-Path $exePath

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName         = $exePath
          $psi.WorkingDirectory = $workDir
          $psi.UseShellExecute  = $true
          $chrono = [System.Diagnostics.Stopwatch]::StartNew()
          $proc   = [System.Diagnostics.Process]::Start($psi)
          Write-Host "PID $($proc.Id) - attente fenetre..."

          $launched = $false
          $timeout  = 15
          while ($chrono.Elapsed.TotalSeconds -lt $timeout) {
            $proc.Refresh()
            if ($proc.HasExited) {
              Write-Error "FAIL - crash (exit code $($proc.ExitCode))"; exit 1
            }
            if ([Win32Helper]::HasWindowForPid($proc.Id)) {
              $launched = $true; break
            }
            Start-Sleep -Milliseconds 50
          }
          $chrono.Stop()

          $ms = [math]::Round($chrono.Elapsed.TotalMilliseconds)
          $s  = [math]::Round($chrono.Elapsed.TotalSeconds, 2)

          if (-not $launched) {
            Write-Error "FAIL - fenetre non apparue apres ${timeout}s"; exit 1
          }

          Write-Host "============================================"
          Write-Host "Temps de lancement C++ : ${s} s (${ms} ms)"
          if     ($s -lt 0.5) { Write-Host "Instantane (< 500ms)" }
          elseif ($s -lt 1)   { Write-Host "Excellent (< 1s)"     }
          elseif ($s -lt 2)   { Write-Host "Bon (< 2s)"           }
          else                 { Write-Host "Acceptable (>= 2s)"   }
          Write-Host "============================================"
          echo "LAUNCH_MS=$ms" >> $env:GITHUB_ENV
          echo "LAUNCH_S=$s"   >> $env:GITHUB_ENV

          Start-Sleep -Milliseconds 500
          Add-Type -AssemblyName System.Windows.Forms, System.Drawing
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($screen.Width, $screen.Height)
          $gfx = [System.Drawing.Graphics]::FromImage($bmp)
          $gfx.CopyFromScreen($screen.Location, [System.Drawing.Point]::Empty, $screen.Size)
          $bmp.Save("test_dir\screenshot.png")
          $gfx.Dispose(); $bmp.Dispose()
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host "PASS - screenshot capture"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-screenshot-cpp
          path: test_dir\screenshot.png
          retention-days: 7

      - name: Test summary
        if: always()
        shell: pwsh
        run: |
          $ms   = if ($env:LAUNCH_MS) { $env:LAUNCH_MS } else { "N/A" }
          $s    = if ($env:LAUNCH_S)  { $env:LAUNCH_S  } else { "N/A" }
          $perf = if ($env:LAUNCH_S) {
            $v = [double]$env:LAUNCH_S
            if     ($v -lt 0.5) { "Instantane (< 500ms)" }
            elseif ($v -lt 1)   { "Excellent (< 1s)"     }
            elseif ($v -lt 2)   { "Bon (< 2s)"           }
            else                 { "Acceptable (>= 2s)"   }
          } else { "N/A" }
          echo "## Tests TileLauncher C++" >> $env:GITHUB_STEP_SUMMARY
          echo "| Test | Resultat |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| 1 - Exe present | OK |" >> $env:GITHUB_STEP_SUMMARY
          echo "| 2 - tiles.ini present | OK |" >> $env:GITHUB_STEP_SUMMARY
          echo "| 3 - Demarrage sans crash | OK |" >> $env:GITHUB_STEP_SUMMARY
          echo "| 4 - Temps lancement + Screenshot | OK |" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## Performance C++ vs Python" >> $env:GITHUB_STEP_SUMMARY
          echo "| | C++ natif | Python PyInstaller |" >> $env:GITHUB_STEP_SUMMARY
          echo "|--|--|--|" >> $env:GITHUB_STEP_SUMMARY
          echo "| Temps fenetre visible | **${s} s** (${ms} ms) | ~1.8 s |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Appreciation | $perf | Excellent (< 2s) |" >> $env:GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════
  release:
    needs: [ build, test ]
    runs-on: windows-2025-vs2026

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: TileLauncher_Cpp_Win11_x64
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: cpp-v1.0.${{ github.run_number }}
          name: "TileLauncher C++ v1.0.${{ github.run_number }} — Windows 11 x64"
          body: |
            ## TileLauncher C++ — Standalone Windows 11 x64

            Application native Qt6/C++ — démarrage instantané.

            ### Installation
            1. Extraire le ZIP
            2. Double-cliquer sur `TileLauncher.exe`
            3. Éditer `tiles.ini` pour configurer vos 8 tuiles
          files: dist\TileLauncher_Cpp_Win11_x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
