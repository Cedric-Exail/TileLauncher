; ============================================================
;  TileLauncher - Fichier de configuration des tuiles
;  Sections : [Tile1] à [Tile8]
;
;  Paramètres disponibles par tuile :
;    label   = Texte affiché sous l'icône
;    icon    = Chemin vers une image .png / .ico / .jpg
;              (absolu ou relatif à l'emplacement de l'exe)
;              Si vide, une icône par défaut est générée.
;    command = Chemin complet vers l'exécutable ou le script
;    args    = Arguments optionnels passés à la commande
;
;  Exemples de commandes Windows :
;    Explorateur    : C:\Windows\explorer.exe
;    Bloc-notes     : C:\Windows\notepad.exe
;    Script Python  : C:\Python312\python.exe
;    Script bat     : C:\Scripts\mon_script.bat
;    URL navigateur : C:\Program Files\Google\Chrome\Application\chrome.exe
; ============================================================

[Tile1]
label   = Explorateur
icon    =
command = C:\Windows\explorer.exe
args    =

[Tile2]
label   = Bloc-notes
icon    =
command = C:\Windows\notepad.exe
args    =

[Tile3]
label   = Calculatrice
icon    =
command = C:\Windows\System32\calc.exe
args    =

[Tile4]
label   = Terminal
icon    =
command = C:\Windows\System32\cmd.exe
args    =

[Tile5]
label   = PowerShell
icon    =
command = C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
args    =

[Tile6]
label   = Panneau config
icon    =
command = C:\Windows\System32\control.exe
args    =

[Tile7]
label   = Gestionnaire tâches
icon    =
command = C:\Windows\System32\taskmgr.exe
args    =

[Tile8]
label   = Éditeur registre
icon    =
command = C:\Windows\regedit.exe
args    =
