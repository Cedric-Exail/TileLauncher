; ============================================================
;  TileLauncher - Fichier de configuration
; ============================================================
;
;  [App]
;    title   = Nom affiché dans la barre de titre (Gilroy, céladon)
;
;  [Tile1] à [Tile8]
;    label   = Texte affiché en bas de la tuile
;    icon    = Chemin image .png / .ico / .jpg (absolu ou relatif)
;              L'image remplit toute la tuile (recadrage centré).
;              Si vide, une icône dégradée avec l'initiale est générée.
;    command = Exécutable ou script à lancer
;    args    = Arguments optionnels
;
;  Police Gilroy : placer les fichiers Gilroy-*.ttf dans un sous-dossier
;  "fonts/" à côté de TileLauncher.exe
;
; ============================================================

[App]
title = ⚡ Mon Lanceur

[Tile1]
label   = Explorateur
icon    =
command = C:\Windows\explorer.exe
args    =

[Tile2]
label   = Bloc-notes
icon    =
command = C:\Windows\notepad.exe
args    =

[Tile3]
label   = Calculatrice
icon    =
command = C:\Windows\System32\calc.exe
args    =

[Tile4]
label   = Terminal
icon    =
command = C:\Windows\System32\cmd.exe
args    =

[Tile5]
label   = PowerShell
icon    =
command = C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
args    =

[Tile6]
label   = Panneau config
icon    =
command = C:\Windows\System32\control.exe
args    =

[Tile7]
label   = Gest. tâches
icon    =
command = C:\Windows\System32\taskmgr.exe
args    =

[Tile8]
label   = Registre
icon    =
command = C:\Windows\regedit.exe
args    =
